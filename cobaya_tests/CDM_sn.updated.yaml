theory:
  classy:
    path: null
    speed: 0.2
    stop_at_error: false
    extra_args: null
    ignore_obsolete: true
    use_renames: false
    renames:
      As: A_s
      ns: n_s
      nrun: alpha_s
      nrunrun: beta_s
      nt: n_t
      ntrun: alpha_t
      rdrag: rs_drag
      omegak: Omega_k
      omegal: Omega_Lambda
      w: w0_fld
      wa: wa_fld
      omegabh2: omega_b
      omegab: Omega_b
      omegach2: omega_cdm
      omegac: Omega_cdm
      omegam: Omega_m
      omegan: Omega_nu
      tau: tau_reio
      zrei: z_reio
      deltazrei: reionization_width
      helium_redshift: helium_fullreio_redshift
      helium_delta_redshift: helium_fullreio_width
      yhe: YHe
      yheused: YHe
    version: v3.3.4
    input_params:
    - N_ncdm
    - N_ur
    - omega_b
    - omega_cdm
    - H0
    - n_s
    - A_s
    output_params: []
likelihood:
  sn.pantheon:
    path: null
    dataset_file: Pantheon/full_long.dataset
    dataset_params: null
    aliases:
    - Pantheon
    - Pantheon18
    use_abs_mag: false
    speed: 100
    type: SN
    stop_at_error: false
    version: null
    input_params: []
    output_params: []
params:
  N_ncdm:
    value: 1
  N_ur:
    value: 3.0328
  omega_b:
    prior:
      min: 0.018
      max: 0.026
    ref:
      dist: norm
      loc: 0.022
      scale: 0.001
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.15
      max: 0.35
    proposal: 0.01
    ref:
      dist: norm
      loc: 0.25
      scale: 0.01
    renames:
    - omegach2
  H0:
    prior:
      min: 60
      max: 80
    proposal: 0.1
    ref:
      dist: norm
      loc: 70
      scale: 2
  n_s:
    value: 0.965
    renames:
    - ns
  A_s:
    value: 2.1e-09
    renames:
    - As
  chi2__SN:
    latex: \chi^2_\mathrm{SN}
    derived: true
sampler:
  mcmc:
    burn_in: 0
    max_tries: 40d
    covmat: auto
    covmat_params: null
    proposal_scale: 2.4
    output_every: 60s
    learn_every: 40d
    temperature: 1
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0
    max_samples: .inf
    Rminus1_stop: 0.005
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4
    measure_speeds: true
    oversample_power: 0.4
    oversample_thin: true
    drag: false
    blocking:
    - - 1
      - - omega_b
        - omega_cdm
        - H0
    callback_function: null
    callback_every: null
    seed: null
    check_every: null
    oversample: null
    drag_limits: null
    fallback_covmat_scale: 4
    version: 3.5.7
stop_at_error: true
output: CDM_sn
version: 3.5.7
